<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyPrint Ultra ♾️</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PrismJS for Real-Time Syntax Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

  <style>
    /* ==========================================================================
       ULTRA PRINT ENGINE ♾️ - SUPER DYNAMIC AUTO-FIT
       ========================================================================== */
    @media print {
      /* MATHEMATICAL PERFECTION FOR A4 CENTERED CUTS */
      @page { 
        size: A4 portrait; 
        margin: 36mm 17.5mm; 
      }
      
      body.landscape-mode @page {
        size: A4 landscape;
        margin: 17.5mm 36mm;
      }
      
      body, html { 
        background: white !important; 
        color: black !important;
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important; 
        width: 100% !important;
        height: auto !important;
        overflow: visible !important; /* ALLOW NATIVE FLOW / NO HIDE */
      }
      
      .no-print { display: none !important; }
      
      .print-reset-layout {
         display: block !important;
         width: 100% !important;
         height: auto !important;
         min-height: 0 !important;
         overflow: visible !important;
         margin: 0 !important;
         padding: 0 !important;
         position: static !important;
      }

      /* Dynamically adjusting master page wrapper */
      .print-flex-page {
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
      }

      body.portrait-mode .print-flex-page {
        width: 17.5cm !important;
        min-height: 22.5cm !important;
      }

      body.landscape-mode .print-flex-page {
        width: 25.5cm !important;
        min-height: 15.5cm !important;
      }
      
      /* Grid that grows dynamically based on content */
      #layout-4up-container { 
        display: grid !important; 
        grid-template-columns: 1fr 1fr !important;
        gap: 8mm !important;
        height: auto !important;
        overflow: visible !important;
      }

      body.portrait-mode #layout-4up-container {
        width: 17.5cm !important;
        grid-template-rows: minmax(calc(50% - 4mm), auto) minmax(calc(50% - 4mm), auto) !important;
      }

      body.landscape-mode #layout-4up-container {
        width: 25.5cm !important;
        grid-template-rows: minmax(calc(50% - 4mm), auto) minmax(calc(50% - 4mm), auto) !important;
      }

      /* Super Dynamic Cut Boxes */
      .cut-box {
        width: 100% !important;
        height: 100% !important;
        overflow: visible !important;
        page-break-inside: auto !important; /* Allow huge boxes to span pages */
        break-inside: auto !important;
      }

      body.hide-cut-lines .cut-marker { display: none !important; }

      /* Header Protection */
      .print-keep-with-next { 
        break-after: avoid !important; 
        page-break-after: avoid !important; 
        break-inside: avoid !important; 
      }
      
      /* RIGID CODE BLOCK CONSTRAINTS - NO OVERLAP, AUTO WRAP, NO SCROLL */
      pre[class*="language-"], code[class*="language-"] { 
        white-space: pre-wrap !important; 
        word-wrap: break-word !important; 
        overflow-wrap: break-word !important;
        background: transparent !important;
        border: none !important;
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        text-shadow: none !important;
        overflow: visible !important; /* FORCE NO SCROLL */
        height: auto !important;
        display: block !important;
      }
    }
    
    /* ==========================================================================
       ULTRA UI/UX STYLES
       ========================================================================== */
    .glass-nav {
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .animated-bg {
      background: linear-gradient(-45deg, #0a0c10, #111827, #0f172a, #0a0c10);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); border: 2px solid transparent; background-clip: padding-box; }

    /* Custom Input Glowing Focus */
    .ultra-input:focus {
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
      border-color: #38bdf8;
    }

    /* Enforce Black & Bold Syntax on Paper (For Readability) */
    .cut-box pre[class*="language-"] code, 
    .cut-box pre[class*="language-"] .token {
      color: #000 !important;
      text-shadow: none !important;
      font-weight: bold !important;
    }

    /* Prism Editor Sync Hack */
    .editor-wrapper { position: relative; }
    .highlight-layer, .input-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      padding: 1.25rem; font-family: monospace; font-size: 14px; line-height: 1.5;
      white-space: pre-wrap; word-wrap: break-word; overflow-y: auto;
    }
    .input-layer {
      color: transparent; background: transparent; caret-color: #fff; z-index: 2; resize: none;
    }
    .highlight-layer { z-index: 1; pointer-events: none; }
    
    /* Layout specific live preview sizing */
    body.portrait-mode .print-flex-page { width: 17.5cm; min-height: 22.5cm; }
    body.portrait-mode #layout-4up-container { grid-template-rows: minmax(calc(50% - 4mm), auto) minmax(calc(50% - 4mm), auto); }
    
    body.landscape-mode .print-flex-page { width: 25.5cm; min-height: 15.5cm; }
    body.landscape-mode #layout-4up-container { grid-template-rows: minmax(calc(50% - 4mm), auto) minmax(calc(50% - 4mm), auto); }

    /* Hide default scrollbars in code wrappers for print integrity */
    .no-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .no-scroll::-webkit-scrollbar { display: none; }

  </style>
</head>

                    <!-- Code Display Box: Adapts to pure content size -->
                    <div class="code-box-wrapper bg-white border border-slate-200 rounded-xl shadow-sm print-border flex-1 flex flex-col w-full">
                      <div class="bg-slate-50 border-b border-slate-200 px-3 py-1.5 flex items-center justify-between print-keep-with-next print-header-color shrink-0 rounded-t-xl">
                         <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-[#ff5f56]"></div>
                            <div class="w-2 h-2 rounded-full bg-[#ffbd2e]"></div>
                            <div class="w-2 h-2 rounded-full bg-[#27c93f]"></div>
                         </div>
                         <span class="text-[9px] font-mono font-bold text-slate-600 code-title-4up">script_X.py</span>
                         <div class="w-6"></div>
                      </div>
                      
                      <!-- STRICT NO-SCROLL NO-HIDE DYNAMIC CONTAINER -->
                      <div class="bg-white flex-1 p-3 rounded-b-xl w-full h-full relative overflow-visible flex flex-col">
                         <!-- Uses leading-tight and break-words to perfectly wrap text downwards endlessly -->
                         <pre class="!m-0 !p-0 !bg-transparent leading-tight break-words whitespace-pre-wrap no-scroll flex-1"><code class="language-python text-black font-bold code-preview-4up w-full block break-words whitespace-pre-wrap" style="transition: font-size 0.2s;"></code></pre>
                      </div>
                    </div>
                 </div>
              </div>
            </template>
            <!-- Boxes injected dynamically here -->
        </div> 

      </div>
    </div>

  </div>

  <!-- ==========================================
       ULTRA LOGIC ENGINE
       ========================================== -->
  <script>
    // --- Initial State ---
    let appState = {
      orientation: 'portrait',
      code1: `def calculate_fibonacci(n):\n    """\n    Calculate the first n Fibonacci numbers.\n    """\n    if n <= 0:\n        return []\n    elif n == 1:\n        return [0]\n    \n    sequence = [0, 1]\n    while len(sequence) < n:\n        next_val = sequence[-1] + sequence[-2]\n        sequence.append(next_val)\n        \n    return sequence\n\nresult = calculate_fibonacci(10)\nprint(f"Fibonacci sequence: {result}")`,
      code2: `def is_palindrome(word):\n    """Check if a string is a palindrome."""\n    cleaned = word.lower().replace(" ", "")\n    return cleaned == cleaned[::-1]\n\nprint(is_palindrome("Racecar")) # True\nprint(is_palindrome("Python"))  # False`,
      code3: `def factorial(n):\n    """Recursive factorial calculator."""\n    if n == 0 or n == 1:\n        return 1\n    return n * factorial(n - 1)\n\nprint(f"Factorial of 5: {factorial(5)}") # 120`,
      code4: `def is_prime(num):\n    """Determine if a number is prime."""\n    if num <= 1: return False\n    for i in range(2, int(num ** 0.5) + 1):\n        if num % i == 0: return False\n    return True\n\nprint(f"Is 17 prime? {is_prime(17)}") # True`,
      
      title: '',
      author: '',
      date: new Date().toISOString().split('T')[0] // Today
    };

    // --- DOM Elements ---
    const els = {
      // Multiple Python Editors
      codeInput1: document.getElementById('code-input-1'),
      codeHighlight1: document.getElementById('code-highlight-1').querySelector('code'),
      codeInput2: document.getElementById('code-input-2'),
      codeHighlight2: document.getElementById('code-highlight-2').querySelector('code'),
      codeInput3: document.getElementById('code-input-3'),
      codeHighlight3: document.getElementById('code-highlight-3').querySelector('code'),
      codeInput4: document.getElementById('code-input-4'),
      codeHighlight4: document.getElementById('code-highlight-4').querySelector('code'),
      
      // Meta Elements
      metaTitle: document.getElementById('meta-title'),
      metaAuthor: document.getElementById('meta-author'),
      metaDate: document.getElementById('meta-date'),
      
      // Layout System
      layout4upContainer: document.getElementById('layout-4up-container'),
      orientationSelect: document.getElementById('print-orientation')
    };

    // --- Initialize 4-Up Template ---
    function initialize4UpGrid() {
      const template = document.getElementById('template-4up-box');
      els.layout4upContainer.innerHTML = ''; // clear any existing
      for(let i=1; i<=4; i++) {
        const clone = template.content.cloneNode(true);
        clone.querySelector('.code-preview-4up').id = `code-preview-4up-${i}`;
        clone.querySelector('.meta-slot-4up').id = `meta-slot-4up-${i}`;
        clone.querySelector('.code-title-4up').textContent = `script_${i}.py`;
        els.layout4upContainer.appendChild(clone);
      }
    }
    initialize4UpGrid();

    // --- Dynamic Meta Header Injection ---
    function updateMeta() {
      // Build 4-up meta HTML (smaller font)
      const html4Up = `
        <div class="mb-2 border-b-2 border-slate-800 pb-1 flex justify-between items-end print-avoid-break-inside">
          <div class="min-w-0 flex-1 pr-2">
            <h1 class="text-[11px] font-black text-slate-900 tracking-tight leading-tight break-words">${appState.title || 'Untitled Project'}</h1>
            <p class="text-[8px] font-bold text-slate-600 uppercase tracking-wider break-words">${appState.author || 'Anonymous'}</p>
          </div>
          <div class="text-[7.5px] font-bold text-slate-500 bg-slate-100 px-1 py-0.5 rounded border border-slate-200 shrink-0">${appState.date}</div>
        </div>
      `;

      if (!appState.title && !appState.author) {
        // clear 4-up slots if empty
        document.querySelectorAll('.meta-slot-4up').forEach(slot => slot.innerHTML = '');
        return;
      }

      // Inject into all 4 slots
      for (let i = 1; i <= 4; i++) {
        const slot = document.getElementById(`meta-slot-4up-${i}`);
        if(slot) slot.innerHTML = html4Up;
      }
    }

    // --- Format Logic ---
    function formatPythonCode(code) {
      let f = code.replace(/\t/g, '    '); // Tabs to spaces
      f = f.split('\n').map(line => line.trimEnd()).join('\n'); // Trim trailing space
      f = f.replace(/\n{3,}/g, '\n\n'); // Max 2 consecutive newlines
      return f.trim(); // Trim start/end
    }

    // --- Super Dynamic Auto-Fit Algorithm ---
    function applyAutoFit() {
      const wrappers = document.querySelectorAll('.code-box-wrapper');
      wrappers.forEach(wrapper => {
        const pre = wrapper.querySelector('pre');
        const cutBox = wrapper.closest('.cut-box');
        
        // 1. Reset states for measurement
        pre.style.fontSize = '12px';
        wrapper.style.height = '100%';
        cutBox.style.height = '100%';
        wrapper.parentElement.style.height = '100%';
        
        let size = 12;
        let safetyCount = 0;

        // 2. Shrink Font Size if Overflowing (Down to 6px)
        while(pre.scrollHeight > wrapper.clientHeight && size > 6 && safetyCount < 50) {
            size -= 0.5;
            pre.style.fontSize = size + 'px';
            safetyCount++;
        }

        // 3. If it STILL overflows at minimum size, break constraints & Stretch Wide/Tall!
        if (pre.scrollHeight > wrapper.clientHeight) {
            wrapper.style.height = 'auto';
            cutBox.style.height = 'auto';
            wrapper.parentElement.style.height = 'auto';
        } else {
            // 4. If there is dead space, smoothly increase font size (Up to 16px)
            safetyCount = 0;
            while(pre.scrollHeight < wrapper.clientHeight && size < 16 && safetyCount < 50) {
                size += 0.5;
                pre.style.fontSize = size + 'px';
                if (pre.scrollHeight > wrapper.clientHeight) {
                    size -= 0.5; // Backtrack one step if it overflows
                    pre.style.fontSize = size + 'px';
                    break;
                }
                safetyCount++;
            }
        }
      });
    }

    // --- Core Render Function ---
    function renderPreview() {
      // Manage Body Classes for Layout Switch
      if (appState.orientation === 'landscape') {
        document.body.classList.remove('portrait-mode');
        document.body.classList.add('landscape-mode');
      } else {
        document.body.classList.remove('landscape-mode');
        document.body.classList.add('portrait-mode');
      }

      // Sync All 4 Python Editors and Paper Blocks
      for (let i = 1; i <= 4; i++) {
        // 1. Sync Left Side Editor
        els[`codeInput${i}`].value = appState[`code${i}`];
        els[`codeHighlight${i}`].textContent = appState[`code${i}`] + (appState[`code${i}`].endsWith('\n') ? ' ' : '');
        Prism.highlightElement(els[`codeHighlight${i}`]);

        // 2. Sync Right Side Print Preview
        const el = document.getElementById(`code-preview-4up-${i}`);
        if (el) {
          el.textContent = appState[`code${i}`];
          Prism.highlightElement(el);
        }
      }

      // Execute Dynamic Meta Placement
      updateMeta();
      
      // Let DOM paint, then calculate sizes
      setTimeout(applyAutoFit, 10);
    }

    // --- Event Listeners ---

    // Orientation Dropdown Listener
    els.orientationSelect.addEventListener('change', (e) => {
      appState.orientation = e.target.value;
      renderPreview();
    });

    // Setup Sync for all 4 Python Editors
    for (let i = 1; i <= 4; i++) {
      // Input handling
      els[`codeInput${i}`].addEventListener('input', (e) => {
        appState[`code${i}`] = e.target.value;
        renderPreview();
      });
      // Scroll syncing
      els[`codeInput${i}`].addEventListener('scroll', () => {
        els[`codeHighlight${i}`].parentElement.scrollTop = els[`codeInput${i}`].scrollTop;
        els[`codeHighlight${i}`].parentElement.scrollLeft = els[`codeInput${i}`].scrollLeft;
      });
      
      // Copy Button
      document.getElementById(`btn-copy-${i}`).addEventListener('click', () => {
        navigator.clipboard.writeText(appState[`code${i}`]);
        const btn = document.getElementById(`btn-copy-${i}`);
        const original = btn.innerHTML;
        btn.innerHTML = `<svg class="w-3 h-3 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
        setTimeout(() => btn.innerHTML = original, 1500);
      });
    }

    // Format All Button
    document.getElementById('btn-format-all').addEventListener('click', () => {
      for(let i = 1; i <= 4; i++) {
        appState[`code${i}`] = formatPythonCode(appState[`code${i}`]);
      }
      renderPreview();

      const btn = document.getElementById('btn-format-all');
      const original = btn.innerHTML;
      btn.innerHTML = `<svg class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span class="text-green-400">All Formatted</span>`;
      setTimeout(() => btn.innerHTML = original, 1500);
    });

    // Metadata Inputs
    ['title', 'author', 'date'].forEach(key => {
      els[`meta${key.charAt(0).toUpperCase() + key.slice(1)}`].addEventListener('input', (e) => {
        appState[key] = e.target.value;
        renderPreview();
      });
    });

    // Print Settings Toggles (Targets all cut boxes)
    document.getElementById('toggle-cut').addEventListener('change', (e) => {
      const boxes = document.querySelectorAll('.cut-box');
      if(e.target.checked) {
        document.body.classList.remove('hide-cut-lines');
        boxes.forEach(b => {
          b.classList.add('border-slate-400');
          b.classList.remove('border-transparent');
        });
      } else {
        document.body.classList.add('hide-cut-lines');
        boxes.forEach(b => {
          b.classList.remove('border-slate-400');
          b.classList.add('border-transparent');
        });
      }
    });

    // Print Action (Ensures formatting before print)
    document.getElementById('btn-print').addEventListener('click', () => {
      // Auto Format right before print just to ensure maximum space efficiency
      for(let i = 1; i <= 4; i++) {
        appState[`code${i}`] = formatPythonCode(appState[`code${i}`]);
      }
      renderPreview();
      // Wait for DOM to catch up & auto-fit before triggering print
      setTimeout(() => window.print(), 200);
    });

    // --- Initialization ---
    els.metaDate.value = appState.date;
    
    // Format initial state immediately for best fit
    for(let i = 1; i <= 4; i++) {
        appState[`code${i}`] = formatPythonCode(appState[`code${i}`]);
    }
    renderPreview();
    
    // Re-calculate layout if window resizes to keep preview accurate
    window.addEventListener('resize', () => {
       setTimeout(applyAutoFit, 50);
    });

  </script>
</body>
</html>
